name: Sync Temple Data

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    # sync-web自身のコミットでは実行しない（無限ループ防止）
    if: "!contains(github.event.head_commit.message, 'CRM sync')"
    steps:
      - name: Call sync-web Edge Function
        run: |
          curl -X POST https://jbnhvwncddvvtpaigzeq.supabase.co/functions/v1/sync-web \
            -H "Content-Type: application/json"
