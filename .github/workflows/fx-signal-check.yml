name: FX Z-Score Signal Check

on:
  schedule:
    - cron: '0 * * * 1-5'
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/forex-trading-research-h2ypj

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests

      - name: Create config from secrets
        run: |
          cat > research/zscore_notify_config.json << 'TEMPLATE'
          ${{ secrets.ZSCORE_CONFIG }}
          TEMPLATE

      - name: Run signal check
        run: python research/zscore_notify.py check

      # stateをリポジトリにコミットして永続化（重複通知防止の要）
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/zscore_state.json || true
          git diff --cached --quiet || git commit -m "Update zscore state [skip ci]"
          git push || true
